<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>CopyLingo 손글씨 답안</title>
    <link rel="stylesheet" href="/miniapp/handwriting/assets/style.css?v=2605200114">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">CopyLingo Kana</p>
        <h1>화면에 글자를 써 주세요</h1>
        <p class="hint">한 글자를 크게 쓰고 제출하면 AI가 정답 문자와 비교해 채점합니다.</p>
      </section>

      <section class="card">
        <canvas id="pad" width="320" height="320" aria-label="손글씨 입력 패드"></canvas>
        <div class="actions">
          <button id="clear" class="secondary" type="button">지우기</button>
          <button id="submit" class="primary" type="button">제출하기</button>
        </div>
        <div id="loadingPanel" class="loading-panel" hidden>
          <div class="loading-header">
            <span class="spinner" aria-hidden="true"></span>
            <span class="loading-title">채점 중입니다</span>
          </div>
          <div id="tipCard" class="tip-card" aria-live="polite" hidden>
            <span class="tip-eyebrow" id="tipEyebrow"></span>
            <p class="tip-body" id="tipBody"></p>
          </div>
        </div>
        <p id="status" class="status">준비됨</p>
      </section>
    </main>

    <script src="/miniapp/handwriting/assets/app.js?v=2605281500"></script>
  </body>
</html>
